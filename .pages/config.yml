# Pages CMS Configuration
# https://pagescms.org/

site:
  title: Grüner Daumen Gartenbau

collections:
  - name: home
    label: Startseite
    path: content/index.md
    fields:
      - name: hero_title
        type: string
      - name: hero_subtitle
        type: text
      - name: hero_cta_text
        type: string
      - name: hero_cta_link
        type: string

  - name: contact
    label: Kontakt
    path: content/contact.md
    fields:
      - name: address
        type: text
      - name: phone
        type: string
      - name: email
        type: string
      - name: hours
        type: text

  - name: footer
    label: Footer
    path: content/footer.md
    fields:
      - name: copyright_text
        type: string

  - name: services
    label: Leistungen
    folder: content/services/
    fields:
      - name: title
        type: string
      - name: description
        type: text
      - name: icon
        type: string

  - name: testimonials
    label: Kundenstimmen
    folder: content/testimonials/
    fields:
      - name: name
        type: string
      - name: location
        type: string
      - name: quote
        type: text