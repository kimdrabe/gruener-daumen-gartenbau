# Pages CMS Configuration
# https://pages.github.com/

collections:
  # Startseiten-Inhalte
  - name: home
    label: Startseite
    label_singular: Startseite
    path: content/
    filter: 'index.md'
    create: false
    delete: false
    fields:
      - name: hero_title
        label: Hero Titel
        type: string
        required: true
      - name: hero_subtitle
        label: Hero Untertitel
        type: text
        required: true
      - name: hero_cta_text
        label: Hero Button Text
        type: string
        default: Kostenlose Beratung
      - name: hero_cta_link
        label: Hero Button Link
        type: string
        default: '#contact'

  # Leistungen / Services
  - name: services
    label: Leistungen
    label_singular: Leistung
    path: content/services/
    create: true
    delete: true
    filename: '{slug}'
    fields:
      - name: title
        label: Titel
        type: string
        required: true
      - name: description
        label: Beschreibung
        type: text
        required: true
      - name: icon
        label: Icon (Emoji)
        type: string
        default: 🌿
      - name: order
        label: Reihenfolge
        type: number
        default: 0

  # Team / Über uns
  - name: team
    label: Team
    label_singular: Teammitglied
    path: content/team/
    create: true
    delete: true
    filename: '{slug}'
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: role
        label: Berufsbezeichnung
        type: string
        default: Gärtner
      - name: bio
        label: Kurzbeschreibung
        type: text
      - name: image
        label: Bild-URL
        type: string

  # Testimonials / Kundenstimmen
  - name: testimonials
    label: Kundenstimmen
    label_singular: Kundenstimme
    path: content/testimonials/
    create: true
    delete: true
    filename: '{slug}'
    fields:
      - name: name
        label: Name des Kunden
        type: string
        required: true
      - name: location
        label: Ort
        type: string
      - name: quote
        label: Zitat
        type: text
        required: true
      - name: rating
        label: Bewertung (1-5)
        type: number
        default: 5

  # Galerie
  - name: gallery
    label: Galerie
    label_singular: Galeriebild
    path: content/gallery/
    create: true
    delete: true
    filename: '{slug}'
    fields:
      - name: title
        label: Titel
        type: string
        required: true
      - name: image
        label: Bild-URL
        type: string
        required: true
      - name: alt
        label: Alt-Text
        type: string
      - name: category
        label: Kategorie
        type: select
        options:
          - Garten
          - Pflanzen
          - Terrassen
          - Bäume
          - Blumen

  # Kontaktinformationen
  - name: contact
    label: Kontakt
    label_singular: Kontakt
    path: content/
    filter: 'contact.md'
    create: false
    delete: false
    fields:
      - name: address
        label: Adresse
        type: text
      - name: phone
        label: Telefon
        type: string
      - name: email
        label: E-Mail
        type: string
      - name: hours
        label: Öffnungszeiten
        type: text
      - name: map_embed
        label: Google Maps Embed Code
        type: text

  # Footer Links
  - name: footer
    label: Footer
    label_singular: Footer
    path: content/
    filter: 'footer.md'
    create: false
    delete: false
    fields:
      - name: copyright_text
        label: Copyright Text
        type: string
        default: © 2025 Grüner Daumen Gartenbau
      - name: social_facebook
        label: Facebook Link
        type: string
      - name: social_instagram
        label: Instagram Link
        type: string
      - name: social_linkedin
        label: LinkedIn Link
        type: string

# Globale Einstellungen
settings:
  logo_text: Grüner Daumen
  primary_color: '#cc785c'
  footer_tagline: Professionelle Gartenpflege in München